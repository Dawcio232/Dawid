<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core System - Terminal Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #030704;
            color: #00ff66;
            text-shadow: 0 0 4px rgba(0, 255, 102, 0.5);
            padding: 30px 20px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Zaawansowany efekt monitora CRT z ruchomą linią pasów */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 99999;
            background-size: 100% 5px, 6px 100%;
            pointer-events: none;
        }

        /* Ruchoma linia skanująca kineskopu */
        @keyframes scanline {
            0% { top: -100%; }
            100% { top: 100%; }
        }
        .crt-scan {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100px;
            background: linear-gradient(to bottom, rgba(0,255,102,0), rgba(0,255,102,0.04) 50%, rgba(0,255,102,0));
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: 99998;
        }

        /* Ekran powitalny */
        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #030704;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 4px solid #00ff66;
            margin: 0;
        }

        .blink {
            animation: blinker 1.2s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        #terminal {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            background: rgba(5, 15, 5, 0.3);
            padding: 20px;
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.05);
        }

        .output-line {
            margin-bottom: 10px;
            white-space: pre-wrap;
            word-wrap: break-word;
            animation: fadeIn 0.1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(2px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ascii-art {
            color: #45f3ff;
            text-shadow: 0 0 6px rgba(69, 243, 255, 0.6);
            font-weight: bold;
            line-height: 1.2;
            margin: 25px 0;
            font-size: 14px;
        }

        .input-line {
            display: flex;
            align-items: center;
            margin-top: 20px;
            border-top: 1px dashed rgba(0, 255, 102, 0.2);
            padding-top: 15px;
        }

        .prompt {
            color: #45f3ff;
            margin-right: 10px;
            font-weight: bold;
        }

        input[type="text"] {
            background: transparent;
            border: none;
            color: #00ff66;
            text-shadow: 0 0 4px rgba(0, 255, 102, 0.5);
            font-family: inherit;
            font-size: 16px;
            outline: none;
            flex: 1;
        }

        .tag {
            color: #030704;
            background: #00ff66;
            padding: 2px 8px;
            font-weight: bold;
            margin-right: 6px;
            font-size: 11px;
            text-transform: uppercase;
            border-radius: 2px;
        }
        
        .project-box {
            border: 1px solid rgba(0, 255, 102, 0.4);
            padding: 20px;
            margin: 15px 0;
            background: rgba(0, 20, 5, 0.4);
            border-left: 4px solid #00ff66;
        }

        /* Customowy, minimalistyczny scrollbar retro */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #030704;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 102, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00ff66;
        }
    </style>
</head>
<body>

    <div class="crt-scan"></div>

    <!-- BOOT SCREEN -->
    <div id="boot-screen" onclick="bootSystem()">
        <p style="font-size: 22px; color: #00ff66; letter-spacing: 2px;">⚡ CORE SYSTEM INITIALIZATION ⚡</p>
        <p class="blink" style="margin-top: 15px; color: #45f3ff;">[ KLIKNIJ KONSOLĘ, ABY ZAMONTOWAĆ ŚRODOWISKO ]</p>
    </div>

    <!-- TERMINAL -->
    <div id="terminal">
        <div id="history"></div>
        
        <div class="input-line">
            <span class="prompt">operator@stack-node:~$</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const history = document.getElementById('history');
        const terminal = document.getElementById('terminal');
        const bootScreen = document.getElementById('boot-screen');
        const cmdInput = document.getElementById('cmd-input');

        // Baza danych projektów (Czyste opisy techniczne)
        const projects = [
            {
                title: "Hardware Status Panel (LED Matrix Control)",
                desc: "Fizyczny moduł statusowy oparty na mikrokontrolerze dedykowanym architekturze ARM. Oprogramowanie bazuje na asynchronicznym frameworku sieciowym IoT, komunikując się bezprzewodowo z nadrzędnym ekosystemem zarządzania.",
                tags: ["hardware", "iot-firmware", "automation"]
            },
            {
                title: "Lokalne Wdrożenie Ekosystemu Automatyki Domowej",
                desc: "Implementacja oraz kompleksowa konfiguracja scentralizowanego serwera nadzorującego automatykę. Integracja protokołów sieciowych, zarządzanie stanami sensorów oraz zaprojektowanie responsywnych paneli operatorskich.",
                tags: ["server-side", "smart-home", "network-nodes"]
            },
            {
                title: "Digital Audio Stem Extraction & Rework",
                desc: "Cyfrowa separacja składowych pasma akustycznego (izolacja ścieżek wokalnych i instrumentalnych). Miks, edycja dynamiczna oraz zaawansowana sekwencja aranżacji ścieżki basowej w cyfrowym środowisku DAW.",
                tags: ["audio-dsp", "remixing", "sound-design"]
            }
        ];

        // Syntetyzator dźwięku retro (Web Audio API)
        function playRetroBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Beep 1 - Przekaźnik hardware
                let osc1 = ctx.createOscillator();
                let gain1 = ctx.createGain();
                osc1.type = 'triangle';
                osc1.frequency.setValueAtTime(120, ctx.currentTime);
                gain1.gain.setValueAtTime(0.15, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start();
                osc1.stop(ctx.currentTime + 0.08);

                // Beep 2 - Sygnał BIOS
                setTimeout(() => {
                    let osc2 = ctx.createOscillator();
                    let gain2 = ctx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(880, ctx.currentTime);
                    gain2.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start();
                    osc2.stop(ctx.currentTime + 0.35);
                }, 120);
            } catch(e) {
                console.log("Audio not supported or blocked by policy");
            }
        }

        function bootSystem() {
            bootScreen.style.display = 'none';
            terminal.style.display = 'block';
            playRetroBeep();

            const bootLines = [
                "CORE-BIOS v9.86 INITIALIZATION...",
                "CHECKING VOLATILE MEMORY... REGISTERED OK",
                "LOADING NETWORKING STACK: IPv4 Subnet Node Active",
                "PERIPHERALS: USB Debugging Bridge Enabled",
                "MOUNTING REPOSITORIES... SUCCESS",
                "LAUNCHING KERNEL INTERFACE SHADOW..."
            ];

            let delay = 0;
            bootLines.forEach(line => {
                setTimeout(() => {
                    printLine(`[ OK ] ${line}`);
                }, delay);
                delay += 200;
            });

            setTimeout(() => {
                printAscii();
                printLine("Połączenie zabezpieczone. Witamy w powłoce TERMINAL-OS.");
                printLine("Wpisz <span style='color:#fff;'>help</span> aby wywołać spis dostępnych instrukcji systemowych.\n");
                cmdInput.focus();
            }, delay + 150);
        }

        function printLine(text, cssClass = 'output-line') {
            const div = document.createElement('div');
            div.className = cssClass;
            div.innerHTML = text;
            history.appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function printAscii() {
            // Poprawiony ASCII Art (odpowiednio zbalansowane znaki ucieczki)
            const art = 
` _____ _____ ____  __  __ ___ _   _    _    _          ___  ____  
|_   _| ____|  _ \\|  \\/  |_ _| \\ | |  / \\  | |        / _ \\/ ___| 
  | | |  _| | |_) | |\\/| || ||  \\| | / _ \\ | |       | | | \\___ \\ 
  | | | |___|  _ <| |  | || || |\\  |/ ___ \\| |___ ___| |_| |___) |
  |_| |_____|_| \\_\\_|  |_|___|_| \\_/_/   \\_\\_____|____\\___/|____/ `;
            printLine(art, 'ascii-art');
        }

        // Minigierka w terminalu (CPS Test)
        let gameActive = false;
        let score = 0;
        function runTerminalGame() {
            if(gameActive) return;
            gameActive = true;
            score = 0;
            cmdInput.blur(); // Zdejmij focus na czas gry, by wpisy nie kolidowały
            printLine("\n>>> URUCHOMIONO PROCEDURĘ TESTOWĄ REFLKSU OPERATORA <<<");
            printLine(">>> CEL: Wciskaj klawisz [ENTER] tak szybko, jak to możliwe!");
            printLine(">>> CZAS TRWANIA: 5 SEKUND. START!");
            
            setTimeout(() => {
                gameActive = false;
                cmdInput.focus();
                printLine(`\n[RAPORT KOŃCOWY] Zarejestrowano wydajność: ${score} akcji na 5 sekund.`);
                if(score >= 25) {
                    printLine("RETRO-STATUS: Wydajność powyżej normy. Rekomendacja: Natychmiastowe zatrudnienie.");
                } else {
                    printLine("RETRO-STATUS: Parametry w normie. Wpisz 'game' w celu ponownej kalibracji.");
                }
            }, 5000);
        }

        // Interpreter komend
        cmdInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const input = this.value.trim();
                const cmd = input.toLowerCase();
                this.value = '';

                if(gameActive) {
                    score++;
                    printLine(`[PING!] Impuls zarejestrowany. Aktualny licznik: ${score}`, 'output-line');
                    return;
                }

                if (input === '') return;

                printLine(`<span class="prompt">operator@stack-node:~$</span> ${input}`);

                switch(cmd) {
                    case 'clear':
                        history.innerHTML = '';
                        break;
                    case 'help':
                        printLine("\nDostępne dyrektywy systemowe:");
                        printLine("  about    - Specyfikacja profilu operatora");
                        printLine("  projects - Wykaz zrealizowanych projektów i makiet technicznych");
                        printLine("  game     - Kalibracja refleksu (interaktywny test)");
                        printLine("  contact  - Dostępne kanały transmisji danych");
                        printLine("  clear    - Czyszczenie bufora ekranu\n");
                        break;
                    case 'about':
                        printLine("\n--- SPECYFIKACJA PROFILU ---");
                        printLine("Zajmuję się inżynierią systemową na poziomie podstawowym: od fizycznego projektowania układów drukowanych i lutowania, przez programowanie mikrokontrolerów niskopoziomowych, aż po administrację domowymi węzłami sieciowymi i serwerami automatyki.");
                        printLine("Kluczowe kompetencje: Praca sprzętowa (Hardware DIY), diagnostyka sieciowa, automatyzacja środowisk rozproszonych.\n");
                        break;
                    case 'projects':
                        printLine("\n--- REJESTR AKTYWNYCH PROJEKTÓW ---");
                        projects.forEach(p => {
                            let tagsHtml = p.tags.map(t => `<span class="tag">${t}</span>`).join(' ');
                            printLine(`
                                <div class="project-box">
                                    <h3 style="color:#45f3ff;">${p.title}</h3>
                                    <p style="color:#c5c6c7; margin: 8px 0 12px 0;">${p.desc}</p>
                                    <div>${tagsHtml}</div>
                                </div>
                            `);
                        });
                        break;
                    case 'game':
                        runTerminalGame();
                        break;
                    case 'contact':
                        printLine("\n--- KANAŁY TRANSMISJI DANYCH ---");
                        printLine("E-mail: kontakt@twojadomena.pl (zastąp własnym)");
                        printLine("GitHub: github.com/twoj-nick-repozytorium (zastąp własnym)");
                        printLine("Strefa operacyjna: Województwo Śląskie, Polska\n");
                        break;
                    default:
                        printLine(`Błąd: Instrukcja '${input}' nie została rozpoznana przez jądro systemu. Wpisz 'help'.`, 'output-line');
                }
            }
        });

        // Wymuszaj focus na polu tekstowym przy kliknięciu w interfejs
        document.addEventListener('click', () => {
            if (!gameActive && bootScreen.style.display === 'none') {
                cmdInput.focus();
            }
        });
    </script>
</body>
</html>
