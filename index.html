<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawid OS - Terminal Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #050505;
            color: #00ff66;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Efekt starego monitora CRT */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .blink {
            animation: blinker 1s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        #terminal {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
        }

        .output-line {
            margin-bottom: 8px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .ascii-art {
            color: #45f3ff;
            font-weight: bold;
            line-height: 1.2;
            margin: 20px 0;
        }

        .input-line {
            display: flex;
            align-items: center;
            margin-top: 15px;
        }

        .prompt {
            color: #45f3ff;
            margin-right: 10px;
            font-weight: bold;
        }

        input[type="text"] {
            background: transparent;
            border: none;
            color: #00ff66;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            flex: 1;
        }

        .tag {
            color: #050505;
            background: #00ff66;
            padding: 2px 6px;
            font-weight: bold;
            margin-right: 5px;
            font-size: 12px;
        }
        
        .project-box {
            border: 1px dashed #00ff66;
            padding: 15px;
            margin: 10px 0;
            background: #0a0f0a;
        }
    </style>
</head>
<body>

    <!-- EKRAN STARTOWY (BOOT) -->
    <div id="boot-screen" onclick="bootSystem()">
        <p style="font-size: 20px; color: #45f3ff;">[ NACIŚNIJ EKRAN, ABY URUCHOMIĆ SYSTEM ]</p>
        <p class="blink" style="margin-top: 10px; color: #888;">(Włącz dźwięk dla pełnego efektu retro)</p>
    </div>

    <!-- WŁAŚCIWY TERMINAL -->
    <div id="terminal">
        <div id="history"></div>
        
        <div class="input-line">
            <span class="prompt">guest@dawid-os:~$</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const history = document.getElementById('history');
        const terminal = document.getElementById('terminal');
        const bootScreen = document.getElementById('boot-screen');
        const cmdInput = document.getElementById('cmd-input');

        // Baza danych o projektach - ŁATWE DODAWANIE NOWYCH:
        const projects = [
            {
                title: "Fizyczny Status-Panel LED Control",
                desc: "Panel sterowania oparty na mikrokontrolerze Raspberry Pi Pico 2 W. Wykorzystuje oprogramowanie ESPHome, wysyłając stany do systemu nadrzędnego.",
                tags: ["pico-2w", "esphome", "diy-hardware"]
            },
            {
                title: "Wdrożenie Ekosystemu Home Assistant",
                desc: "Zbudowanie lokalnego serwera automatyki domowej. Integracja oświetlenia, sieci LAN oraz autorskie panele sterowania (dashboards).",
                tags: ["home-assistant", "smarthome", "server"]
            },
            {
                title: "BandLab Remix Project - 'Wakacje'",
                desc: "Cyfrowa obróbka dźwięku: izolacja ścieżek wokalnych i instrumentalnych (stems), zaawansowana aranżacja oraz produkcja linii basowej 808.",
                tags: ["audio-production", "stems", "remix"]
            }
        ];

        // Dźwięk retro komputera generowany przez kod (Web Audio API)
        function playRetroBeep() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Dźwięk 1: Kliknięcie przekaźnika
            let osc1 = ctx.createOscillator();
            let gain1 = ctx.createGain();
            osc1.type = 'sawtooth';
            osc1.frequency.setValueAtTime(80, ctx.currentTime);
            gain1.gain.setValueAtTime(0.1, ctx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
            osc1.connect(gain1);
            gain1.connect(ctx.destination);
            osc1.start();
            osc1.stop(ctx.currentTime + 0.05);

            // Dźwięk 2: Stary wysoki pisk BIOSu
            setTimeout(() => {
                let osc2 = ctx.createOscillator();
                let gain2 = ctx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(900, ctx.currentTime);
                gain2.gain.setValueAtTime(0.15, ctx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
                osc2.connect(gain2);
                gain2.connect(ctx.destination);
                osc2.start();
                osc2.stop(ctx.currentTime + 0.4);
            }, 100);
        }

        function bootSystem() {
            bootScreen.style.display = 'none';
            terminal.style.display = 'block';
            playRetroBeep();

            const bootLines = [
                "DAWID ARCH-BIOS v4.86 (C) 2026",
                "CPU: ARM Cortex-M33 @ 150MHz (Raspberry Pi Silicon)",
                "RAM: 520KB SRAM OK...",
                "DETECTING ATTACHED DEVICES...",
                "  > USB DEV 0: Nothing Phone 4a Pro [CONNECTED]",
                "  > USB DEV 1: Redmi Note 11 [DEBUG MODE ACTIVE]",
                "NETWORKING: Local Area Subnet initialized successfully.",
                "MOUNTING REPOSITORIES... DONE.",
                "LOADING CORE INTERFACE..."
            ];

            let delay = 0;
            bootLines.forEach(line => {
                setTimeout(() => {
                    printLine(line);
                }, delay);
                delay += 250;
            });

            setTimeout(() => {
                printAscii();
                printLine("Witamy w systemie Dawid OS.");
                printLine("Wpisz 'help', aby zobaczyć dostępne komendy powłoki systemowej.");
                cmdInput.focus();
            }, delay + 200);
        }

        function printLine(text, cssClass = 'output-line') {
            const div = document.createElement('div');
            div.className = cssClass;
            div.innerHTML = text;
            history.appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function printAscii() {
            const art = `
 ____    _ __        ___ ____         ___  ____  
|  _ \\  / \\\\ \\      / / |_  \\       / _ \\/ ___| 
| | | |/ _ \\\\ \\ /\\ / /   | | |_____| | | \\___ \\ 
| |_| / ___ \\\\ V  V /    | | |_____| |_| |___) |
|____/_/   \\_\\\\_/\\_/    |___/       \\___/|____/ 
            `;
            printLine(art, 'ascii-art');
        }

        // Gra w klikanie (w wersji tekstowej wewnątrz terminala)
        let gameActive = false;
        let score = 0;
        function runTerminalGame() {
            if(gameActive) return;
            gameActive = true;
            score = 0;
            printLine(">>> Uruchomiono PROTOTYP SYSTEMU REFLEKSU. Masz 5 sekund!");
            printLine(">>> KAŻDE wciśnięcie klawisza ENTER to 1 punkt. REKRUTERZE, DAWAJ!");
            
            setTimeout(() => {
                gameActive = false;
                printLine(`\n[KONIEC TESTU] Twój wynik: ${score} CPS.`);
                if(score > 25) {
                    printLine("STATUS: KANDYDAT IDEALNY. WYŚLIJ UMOWĘ PRACY.");
                } else {
                    printLine("STATUS: Wynik stabilny. Wpisz 'game' aby spróbować ponownie.");
                }
            }, 5000);
        }

        // Obsługa wpisywanych komend
        cmdInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const input = this.value.trim();
                const cmd = input.toLowerCase();
                this.value = '';

                if(gameActive) {
                    score++;
                    printLine(`[KLIK!] Aktualny wynik: ${score}`, 'output-line');
                    return;
                }

                printLine(`<span style="color: #45f3ff;">guest@dawid-os:~$</span> ${input}`);

                if (cmd === 'clear') {
                    history.innerHTML = '';
                } else if (cmd === 'help') {
                    printLine("Dostępne komendy:");
                    printLine("  about    - Informacje o mnie (kim jestem)");
                    printLine("  projects - Wykaz zrealizowanych projektów i makiet");
                    printLine("  game     - Test refleksu dla rekrutera");
                    printLine("  contact  - Dane kontaktowe i link do GitHuba");
                    printLine("  clear    - Czyszczenie ekranu terminala");
                } else if (cmd === 'about') {
                    printLine("\n--- PROFIL UŻYTKOWNIKA ---");
                    printLine("Uczeń i konstruktor. Zajmuję się sprzętem DIY, automatyzacją procesów oraz mikrokontrolerami.");
                    printLine("Moje środowisko naturalne to warsztat z lutownicą i edytor kodu konfiguracji sieciowej.");
                } else if (cmd === 'projects') {
                    printLine("\n--- REJESTR PROJEKTÓW ---");
                    projects.forEach(p => {
                        let tagsHtml = p.tags.map(t => `<span class="tag">${t}</span>`).join(' ');
                        printLine(`
                            <div class="project-box">
                                <h3 style="color:#fff;">${p.title}</h3>
                                <p style="color:#aaa; margin: 5px 0;">${p.desc}</p>
                                <div>${tagsHtml}</div>
                            </div>
                        `);
                    });
                } else if (cmd === 'game') {
                    runTerminalGame();
                } else if (cmd === 'contact') {
                    printLine("\n--- KANAŁY ŁĄCZNOŚCI ---");
                    printLine("E-mail: kontakt@twojadomena.pl");
                    printLine("GitHub: github.com/twoj-nick");
                    printLine("Lokalizacja operacyjna: Racibórz i okolice");
                } else if (cmd !== "") {
                    printLine(`Błąd: Nie rozpoznano komendy '${input}'. Wpisz 'help'.`, 'output-line');
                }
            }
        });

        // Utrzymuj focus na inputcie przy kliknięciu w dowolne miejsce
        document.addEventListener('click', () => {
            if (!gameActive && bootScreen.style.display === 'none') {
                cmdInput.focus();
            }
        });
    </script>
</body>
</html>
